<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sekolah Santo Leo 1</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #e0f7fa;
        }
        header {
            background-color: #81d4fa;
            padding: 20px;
            text-align: center;
        }
        nav {
            margin: 15px 0;
        }
        nav a {
            margin: 0 15px;
            text-decoration: none;
            color: #0277bd;
        }
        .hero {
            background-color: #4fc3f7;
            color: white;
            padding: 50px;
            text-align: center;
        }
        .info-section {
            padding: 20px;
            margin: 20px;
            background-color: #e1f5fe;
            border-radius: 5px;
        }
        @media (max-width: 600px) {
            .hero {
                padding: 30px;
            }
            .info-section {
                margin: 10px;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to Sekolah Santo Leo 1</h1>
        <nav>
            <a href="#home">Home</a>
            <a href="#about">About</a>
            <a href="#contact">Contact</a>
        </nav>
    </header>
    <section class="hero">
        <h2>Your Future Begins Here</h2>
        <p>Join us in a journey of knowledge and discovery.</p>
    </section>
    <section class="info-section" id="about">
        <h3>About Us</h3>
        <p>We are committed to providing high-quality education.</p>
    </section>
    <section class="info-section" id="contact">
        <h3>Contact Us</h3>
        <p>For inquiries, reach out to our administration.</p>
    </section>
</body>
</html>
